<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You ! Form Submitted</title>
    
    </head>
    <style>
   body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      display: flex;
      justify-content: center; /* Horizontally center */
      align-items: center;     /* Vertically center */
      min-height: 100vh;       /* Poori screen ki height cover karega */
        background: linear-gradient(135deg, #1E3A5F, #6A2C70, #C72C5B);
      font-family: sans-serif;
    }

    /* 2. Content ko ek jagah alignment me rakhne ke liye container */
    .thank-you-container {
      text-align: center; /* Text aur Image dono ko center karega */
      padding: 20px;
    }

    /* Green Tick Image ki sizing control karne ke liye */
    .thank-you-container img {
      width: 100px; /* Size aap apne hisab se choti-badi kar sakte hain */
      height: auto;
    }

    .thank-you-container h1 {
      font-size: 2.5rem;
    
        
     
    }

    .thank-you-container p {
      font-size: 1.2rem;
      color: #333;
    
    }
  </style>
</head>
<body>

  <div class="thank-you-container">
    <img src="Successfully.png" alt="Success Tick">
    <h1>Thank You !</h1>
    <p style="font-weight:bold ;color:white;">Your Application was successfully Submitted.</p>
        <p style="color: #8b8b8b;">We'll contact you when a decision is made.</p>
  </div>
    
</body>
</html>
